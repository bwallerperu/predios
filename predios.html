<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Inmobiliario v1.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f3f4f6;
        }
    </style>
</head>

<body class="min-h-screen">
    <div id="app" class="max-w-6xl mx-auto px-4 py-8">
        <!-- Header -->
        <header
            class="bg-white rounded-xl shadow-sm p-6 mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">Inmobiliaria Pro</h1>
                <p class="text-gray-500">Sistema de Administración de Activos</p>
            </div>
            <!-- Navigation Tabs -->
            <nav class="flex space-x-4 mt-4 md:mt-0">
                <button onclick="switchSection('section-predios')" id="tab-predios"
                    class="px-4 py-2 font-medium rounded-lg transition-colors bg-blue-100 text-blue-700">Propiedades</button>
                <button onclick="switchSection('section-clientes')" id="tab-clientes"
                    class="px-4 py-2 font-medium rounded-lg transition-colors text-gray-500 hover:bg-gray-100">Clientes</button>
            </nav>

        </header>


        <!-- Main Content -->
        <main id="content">
            <!-- Sección Predios -->
            <section id="section-predios">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-semibold text-gray-700">Listado de Propiedades</h2>
                    <button id="btn-new-property"
                        class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 shadow-md flex items-center">
                        <i class="fas fa-plus mr-2"></i> Nuevo Predio
                    </button>
                </div>
                <div id="property-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Cards via JS -->
                </div>
            </section>

            <!-- Sección Clientes -->
            <section id="section-clientes" class="hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-semibold text-gray-700">Listado de Clientes</h2>
                    <button id="btn-new-client" onclick="openClientModal()"
                        class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 shadow-md flex items-center">
                        <i class="fas fa-user-plus mr-2"></i> Nuevo Cliente
                    </button>
                </div>
                <div id="client-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Cards via JS -->
                </div>
            </section>


        </main>
    </div>



    <!-- Modals (Client) -->
    <div id="modal-client"
        class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-xl max-h-[90vh] overflow-y-auto p-8 shadow-2xl">
            <h3 class="text-2xl font-bold mb-6 text-gray-800">Detalles del Cliente</h3>
            <form id="client-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">ID Cliente</label>
                    <input type="text" id="c-id" placeholder="Automático si se deja vacío"
                        class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Nombre del Cliente</label>
                    <input type="text" id="c-nombre" required
                        class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Teléfono</label>
                    <input type="text" id="c-telefono"
                        class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Propiedades Visitadas</label>
                    <div id="client-properties-container" class="space-y-2 mb-2">
                        <!-- Dynamic rows via JS -->
                    </div>
                    <button type="button" onclick="addPropertyRow()"
                        class="text-sm bg-blue-50 text-blue-600 px-3 py-1 rounded hover:bg-blue-100 transition-colors flex items-center">
                        <i class="fas fa-plus mr-1"></i> Agregar Propiedad
                    </button>
                </div>

                <div class="flex justify-end space-x-3 mt-6">
                    <button type="button" onclick="closeModal('modal-client')"
                        class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300">Cancelar</button>
                    <button type="submit"
                        class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 shadow-lg font-bold">Guardar
                        Cliente</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modals (Property) -->
    <div id="modal-property"
        class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto p-8 shadow-2xl">
            <h3 class="text-2xl font-bold mb-6 text-gray-800">Detalles de la Propiedad</h3>
            <form id="property-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="hidden" id="p-id">
                <div class="col-span-2 md:col-span-1">
                    <label class="block text-sm font-medium text-gray-700">Nombre del Predio</label>
                    <input type="text" id="p-nombre" required
                        class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm">
                </div>
                <div class="col-span-2 md:col-span-1">
                    <label class="block text-sm font-medium text-gray-700">Dirección</label>
                    <input type="text" id="p-direccion" required
                        class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm">
                </div>
                <div class="col-span-2 md:col-span-1">
                    <label class="block text-sm font-medium text-gray-700">Contacto</label>
                    <input type="text" id="p-contacto"
                        class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm">
                </div>
                <div class="col-span-2 md:col-span-1">
                    <label class="block text-sm font-medium text-gray-700">Teléfono</label>
                    <input type="text" id="p-telefono"
                        class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Tipo de Propiedad</label>
                    <select id="p-tipo" class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm">
                        <option>Departamento</option>
                        <option>Casa</option>
                        <option>Oficina</option>
                        <option>Local Comercial</option>
                        <option>Terreno</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Tipo de Alquiler / Operación</label>
                    <select id="p-operacion" class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm">
                        <option>Venta</option>
                        <option>Alquiler</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Precio Venta (USD)</label>
                    <input type="text" id="p-precio"
                        class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm format-currency">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Precio Min. Venta (USD)</label>
                    <input type="text" id="p-min-venta"
                        class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm format-currency">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Precio Alquiler (USD)</label>
                    <input type="text" id="p-precio-alquiler"
                        class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm format-currency">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Precio Min. Alquiler (USD)</label>
                    <input type="text" id="p-min-alquiler"
                        class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm format-currency">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">% Com Max</label>
                    <input type="text" id="p-comision-max"
                        class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm format-currency">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">% Com Min</label>
                    <input type="text" id="p-comision-min"
                        class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm format-currency">
                </div>
                <div class="col-span-2">
                    <label class="block text-sm font-medium text-gray-700">Hol Link (URL)</label>
                    <input type="url" id="p-hol-link"
                        class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm"
                        placeholder="https://...">
                </div>
                <div class="col-span-2">
                    <label class="block text-sm font-medium text-gray-700">Notas</label>
                    <textarea id="p-notas" rows="2"
                        class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm"></textarea>
                </div>

                <hr class="col-span-2 my-2 border-gray-100">
                <h4 class="col-span-2 font-semibold text-blue-600">Metrajes (m²)</h4>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Techados (x1.0)</label>
                    <input type="text" id="p-techados"
                        class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm format-currency">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Terrazas (x0.5)</label>
                    <input type="text" id="p-terrazas"
                        class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm format-currency">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Garajes (x1.0)</label>
                    <input type="text" id="p-garajes"
                        class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm format-currency">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Depósitos (x1.0)</label>
                    <input type="text" id="p-depositos"
                        class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm format-currency">
                </div>

                <div class="col-span-2 flex justify-end space-x-3 mt-6">
                    <button type="button" onclick="closeModal('modal-property')"
                        class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300">Cancelar</button>
                    <button type="submit"
                        class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 shadow-lg font-bold">Guardar
                        Propiedad</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        let allProperties = [];

        // Currency Formatting Helpers
        function formatVal(val) {
            if (val === undefined || val === null || val === '') return '';
            const num = parseFloat(String(val).replace(/,/g, ''));
            if (isNaN(num)) return val;
            return num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function unformatVal(val) {
            if (!val) return 0;
            return parseFloat(String(val).replace(/,/g, '')) || 0;
        }

        function setupFormatting() {
            document.querySelectorAll('.format-currency').forEach(input => {
                input.addEventListener('blur', (e) => {
                    e.target.value = formatVal(e.target.value);
                });
                input.addEventListener('focus', (e) => {
                    if (e.target.value) {
                        e.target.value = String(e.target.value).replace(/,/g, '');
                    }
                });
            });
        }


        function switchSection(sectionId) {
            document.getElementById('section-predios').classList.add('hidden');
            document.getElementById('section-clientes').classList.add('hidden');
            document.getElementById(sectionId).classList.remove('hidden');

            // Tabs Styling
            const tabs = {
                'section-predios': 'tab-predios',
                'section-clientes': 'tab-clientes'
            };

            Object.values(tabs).forEach(tabId => {
                const el = document.getElementById(tabId);
                el.classList.remove('bg-blue-100', 'text-blue-700');
                el.classList.add('text-gray-500', 'hover:bg-gray-100');
            });

            const activeTab = document.getElementById(tabs[sectionId]);
            activeTab.classList.remove('text-gray-500', 'hover:bg-gray-100');

            if (sectionId === 'section-clientes') {
                activeTab.classList.add('bg-green-100', 'text-green-700');
            } else {
                activeTab.classList.add('bg-blue-100', 'text-blue-700');
            }

            if (sectionId === 'section-clientes') loadClients();
            else loadProperties();
        }

        async function fetchData(endpoint) {
            try {
                const res = await fetch(`/api/${endpoint}`);
                if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                return await res.json();
            } catch (error) {
                console.error("Fetch error:", error);
                return [];
            }
        }

        async function saveProperty(e) {
            e.preventDefault();
            const id = document.getElementById('p-id').value;
            const data = {
                id: id,
                nombre: document.getElementById('p-nombre').value,
                direccion: document.getElementById('p-direccion').value,
                tipo: document.getElementById('p-tipo').value,
                tipo_operacion: document.getElementById('p-operacion').value,
                precio: unformatVal(document.getElementById('p-precio').value),
                precio_min_venta: unformatVal(document.getElementById('p-min-venta').value),
                precio_alquiler: unformatVal(document.getElementById('p-precio-alquiler').value),
                precio_min_alquiler: unformatVal(document.getElementById('p-min-alquiler').value),
                notas: document.getElementById('p-notas').value,
                metros_techados: unformatVal(document.getElementById('p-techados').value),
                metros_terrazas: unformatVal(document.getElementById('p-terrazas').value),
                metros_garajes: unformatVal(document.getElementById('p-garajes').value),
                metros_depositos: unformatVal(document.getElementById('p-depositos').value),
                contacto: document.getElementById('p-contacto').value,
                telefono: document.getElementById('p-telefono').value,
                hol_link: document.getElementById('p-hol-link').value,
                comision_max_pct: unformatVal(document.getElementById('p-comision-max').value),
                comision_min_pct: unformatVal(document.getElementById('p-comision-min').value)
            };


            await fetch(id ? `/api/properties/${id}` : '/api/properties', {
                method: id ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            closeModal('modal-property');
            loadProperties();
        }

        function openPropertyModal() {
            const form = document.getElementById('property-form');
            const modal = document.getElementById('modal-property');

            if (!form || !modal) {
                console.error("Required elements not found: property-form or modal-property");
                return;
            }

            form.reset();
            document.getElementById('p-id').value = '';
            modal.classList.remove('hidden');
        }



        async function deleteProperty(id) {
            if (!confirm('¿Seguro que desea eliminar esta propiedad?')) return;
            await fetch(`/api/properties/${id}`, { method: 'DELETE' });
            loadProperties();
        }



        async function loadProperties() {
            const list = document.getElementById('property-list');
            list.innerHTML = '<div class="col-span-full text-center py-10"><i class="fas fa-circle-notch fa-spin text-4xl text-blue-500"></i></div>';

            const properties = await fetchData('properties');
            allProperties = properties; // Cache for other uses

            if (properties.length === 0) {
                list.innerHTML = '<div class="col-span-full text-center py-10 text-gray-400">No hay propiedades registradas.</div>';
                return;
            }
            list.innerHTML = properties.map(p => `
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow">
                    <div class="bg-gray-50 p-4 border-b flex justify-between items-start">
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-xs font-bold text-blue-600 uppercase tracking-wider">${p.tipo}</span>
                                <span class="text-[10px] px-1.5 py-0.5 rounded-full font-bold uppercase ${p.tipo_operacion === 'Alquiler' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'}">${p.tipo_operacion || 'Venta'}</span>
                            </div>
                            <h3 class="text-lg font-bold text-gray-800">${p.nombre}</h3>
                            <p class="text-xs text-gray-500"><i class="fas fa-map-marker-alt mr-1"></i>${p.direccion}</p>
                            ${p.contacto ? `<p class="text-xs text-gray-500"><i class="fas fa-user mr-1"></i>${p.contacto}</p>` : ''}
                            ${p.telefono ? `<p class="text-xs text-gray-500"><i class="fas fa-phone mr-1"></i>${p.telefono}</p>` : ''}
                        </div>
                        <div class="flex space-x-1">
                            ${p.hol_link ? `<a href="${p.hol_link}" target="_blank" title="Ver Master" class="p-2 text-blue-400 hover:text-blue-600"><i class="fas fa-external-link-alt"></i></a>` : ''}
                            <button onclick='editProperty(${JSON.stringify(p).replace(/'/g, "&apos;")})' class="p-2 text-gray-400 hover:text-blue-500"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteProperty('${p.id}')" class="p-2 text-gray-400 hover:text-red-500"><i class="fas fa-trash"></i></button>
                        </div>

                    </div>
                    <div class="p-4">
                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <div class="bg-blue-50 p-3 rounded-lg text-center relative border ${p.precio < p.precio_min_venta && p.precio_min_venta > 0 ? 'border-red-300' : 'border-transparent'}">
                                <p class="text-xs text-blue-600 font-medium">Venta</p>
                                <p class="text-xl font-bold text-blue-800">$${(p.precio || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</p>
                                ${p.precio < p.precio_min_venta && p.precio_min_venta > 0 ? '<span class="absolute -top-1 -right-1 flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span></span>' : ''}
                            </div>
                            <div class="bg-green-50 p-3 rounded-lg text-center relative border ${p.precio_alquiler < p.precio_min_alquiler && p.precio_min_alquiler > 0 ? 'border-red-300' : 'border-transparent'}">
                                <p class="text-xs text-green-600 font-medium">Alquiler</p>
                                <p class="text-xl font-bold text-green-800">$${(p.precio_alquiler || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</p>
                                ${p.precio_alquiler < p.precio_min_alquiler && p.precio_min_alquiler > 0 ? '<span class="absolute -top-1 -right-1 flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span></span>' : ''}
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <div class="bg-yellow-50 p-3 rounded-lg text-center">
                                <p class="text-xs text-yellow-600 font-medium">Comisión Max (${(p.comision_max_pct || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}%)</p>
                                <p class="text-lg font-bold text-yellow-800">$${p.metrics ? p.metrics.comision_max_monto.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '0.00'}</p>
                            </div>
                            <div class="bg-gray-50 p-3 rounded-lg text-center">
                                <p class="text-xs text-gray-600 font-medium">Comisión Min (${(p.comision_min_pct || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}%)</p>
                                <p class="text-lg font-bold text-gray-800">$${p.metrics ? p.metrics.comision_min_monto.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '0.00'}</p>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <div class="bg-purple-50 p-3 rounded-lg text-center">
                                <p class="text-xs text-purple-600 font-medium">Área Total Calc.</p>
                                <p class="text-lg font-bold text-purple-800">${p.metrics ? p.metrics.area_total.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '0.00'} m²</p>
                            </div>
                            <div class="bg-orange-50 p-3 rounded-lg text-center">
                                <p class="text-xs text-orange-600 font-medium">Precio / m²</p>
                                <p class="text-lg font-bold text-orange-800">$${p.metrics ? p.metrics.precio_metro.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '0.00'}</p>
                            </div>
                        </div>
                        ${p.notas ? `<p class="text-xs text-gray-500 italic mt-2 line-clamp-2 border-t pt-2">${p.notas}</p>` : ''}
                    </div>
                </div>
            `).join('');
        }
        function editProperty(p) {
            document.getElementById('p-id').value = p.id;
            document.getElementById('p-nombre').value = p.nombre;
            document.getElementById('p-direccion').value = p.direccion;
            document.getElementById('p-tipo').value = p.tipo;
            document.getElementById('p-operacion').value = p.tipo_operacion || 'Venta';
            document.getElementById('p-precio').value = formatVal(p.precio);
            document.getElementById('p-min-venta').value = formatVal(p.precio_min_venta);
            document.getElementById('p-precio-alquiler').value = formatVal(p.precio_alquiler);
            document.getElementById('p-min-alquiler').value = formatVal(p.precio_min_alquiler);
            document.getElementById('p-notas').value = p.notas || '';
            document.getElementById('p-techados').value = formatVal(p.metros_techados);
            document.getElementById('p-terrazas').value = formatVal(p.metros_terrazas);
            document.getElementById('p-garajes').value = formatVal(p.metros_garajes);
            document.getElementById('p-depositos').value = formatVal(p.metros_depositos);
            document.getElementById('p-contacto').value = p.contacto || '';
            document.getElementById('p-telefono').value = p.telefono || '';
            document.getElementById('p-hol-link').value = p.hol_link || '';
            document.getElementById('p-comision-max').value = formatVal(p.comision_max_pct);
            document.getElementById('p-comision-min').value = formatVal(p.comision_min_pct);
            document.getElementById('modal-property').classList.remove('hidden');

        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
        }

        function getPropertyName(id) {
            const p = allProperties.find(prop => prop.id === id);
            return p ? p.nombre : 'Propiedad no encontrada';
        }

        async function loadClients() {
            const list = document.getElementById('client-list');
            list.innerHTML = '<div class="col-span-full text-center py-10"><i class="fas fa-circle-notch fa-spin text-4xl text-blue-500"></i></div>';

            const clients = await fetchData('clients');
            if (clients.length === 0) {
                list.innerHTML = '<div class="col-span-full text-center py-10 text-gray-400">No hay clientes registrados.</div>';
                return;
            }
            list.innerHTML = clients.map(c => {
                let propsHtml = '';
                if (Array.isArray(c.props_visitados)) {
                    propsHtml = c.props_visitados.map(v => {
                        const id = typeof v === 'object' ? v.id : v;
                        const pedido = typeof v === 'object' ? v.precio_pedido : 0;
                        const ofrecido = typeof v === 'object' ? v.precio_ofrecido : 0;
                        return `
                        <div class="bg-gray-50 p-2 rounded text-xs border border-gray-100">
                            <p class="font-bold text-blue-700 mb-1">${getPropertyName(id)}</p>
                            <div class="flex justify-between text-[10px] text-gray-500">
                                <span>Ped: $${formatVal(pedido)}</span>
                                <span>Ofr: $${formatVal(ofrecido)}</span>
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    propsHtml = `<p class="text-sm text-gray-600 italic">${c.props_visitados || 'Ninguna registrada'}</p>`;
                }

                return `
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 hover:shadow-md transition-shadow">
                    <div class="flex justify-between items-start mb-4">
                        <div class="bg-green-50 p-3 rounded-full">
                            <i class="fas fa-user text-green-600 text-xl"></i>
                        </div>
                        <div class="flex space-x-1">
                            <button onclick='editClient(${JSON.stringify(c).replace(/'/g, "&apos;")})' class="p-2 text-gray-400 hover:text-green-500"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteClient('${c.id_cliente}')" class="p-2 text-gray-400 hover:text-red-500"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <h3 class="text-xl font-bold text-gray-800 mb-1">${c.nombre_cliente}</h3>
                    <p class="text-sm text-gray-500 mb-4"><i class="fas fa-phone mr-1"></i>${c.tel_cliente || 'Sin teléfono'}</p>
                    <div class="border-t pt-4">
                        <p class="text-xs font-bold text-gray-400 uppercase mb-2">Visitas:</p>
                        <div class="space-y-2">${propsHtml}</div>
                    </div>
                </div>`;
            }).join('');
        }

        function renderPropertySelects(propertyVisits) {
            const container = document.getElementById('client-properties-container');
            container.innerHTML = '';
            const visits = Array.isArray(propertyVisits) ? propertyVisits : [];
            visits.forEach(v => {
                const visitObj = typeof v === 'object' ? v : { id: v, precio_pedido: 0, precio_ofrecido: 0 };
                addPropertyRow(visitObj);
            });
        }

        function addPropertyRow(visit = { id: '', precio_pedido: 0, precio_ofrecido: 0 }) {
            const container = document.getElementById('client-properties-container');
            const row = document.createElement('div');
            row.className = 'bg-gray-50 p-3 rounded-lg border border-gray-200 space-y-2 relative p-visit-row';

            const mainRow = document.createElement('div');
            mainRow.className = 'flex items-center space-x-2';

            const select = document.createElement('select');
            select.className = 'block w-full border border-gray-300 rounded-md p-2 shadow-sm text-sm p-select-prop';

            const defaultOpt = document.createElement('option');
            defaultOpt.value = '';
            defaultOpt.textContent = '-- Seleccione Propiedad --';
            select.appendChild(defaultOpt);

            allProperties.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.id;
                opt.textContent = `${p.nombre} (${p.tipo_operacion || 'Venta'})`;
                if (p.id === visit.id) opt.selected = true;
                select.appendChild(opt);
            });

            const removeBtn = document.createElement('button');
            removeBtn.type = 'button';
            removeBtn.onclick = () => row.remove();
            removeBtn.className = 'text-red-500 hover:text-red-700 p-2';
            removeBtn.innerHTML = '<i class="fas fa-trash"></i>';

            mainRow.appendChild(select);
            mainRow.appendChild(removeBtn);
            row.appendChild(mainRow);

            const detailsRow = document.createElement('div');
            detailsRow.className = 'grid grid-cols-2 gap-2';

            const pedidoDiv = document.createElement('div');
            pedidoDiv.innerHTML = `
                <label class="block text-[10px] uppercase font-bold text-gray-400">Precio Pedido</label>
                <input type="text" class="w-full border border-gray-300 rounded p-1 text-sm format-currency p-visit-pedido" value="${formatVal(visit.precio_pedido)}">
            `;

            const ofrecidoDiv = document.createElement('div');
            ofrecidoDiv.innerHTML = `
                <label class="block text-[10px] uppercase font-bold text-gray-400">Precio Ofrecido</label>
                <input type="text" class="w-full border border-gray-300 rounded p-1 text-sm format-currency p-visit-ofrecido" value="${formatVal(visit.precio_ofrecido)}">
            `;

            detailsRow.appendChild(pedidoDiv);
            detailsRow.appendChild(ofrecidoDiv);
            row.appendChild(detailsRow);

            container.appendChild(row);

            select.onchange = (e) => {
                const propId = e.target.value;
                const prop = allProperties.find(p => p.id === propId);
                if (prop) {
                    const price = prop.tipo_operacion === 'Alquiler' ? prop.precio_alquiler : prop.precio;
                    row.querySelector('.p-visit-pedido').value = formatVal(price);
                }
            };
            setupFormatting();
        }

        function openClientModal() {
            document.getElementById('client-form').reset();
            document.getElementById('c-id').readOnly = false;
            document.getElementById('c-id').value = '';
            renderPropertySelects([]);
            document.getElementById('modal-client').classList.remove('hidden');
        }

        function editClient(c) {
            document.getElementById('c-id').value = c.id_cliente;
            document.getElementById('c-id').readOnly = true;
            document.getElementById('c-nombre').value = c.nombre_cliente;
            document.getElementById('c-telefono').value = c.tel_cliente || '';
            renderPropertySelects(c.props_visitados);
            document.getElementById('modal-client').classList.remove('hidden');
        }

        async function saveClient(e) {
            e.preventDefault();
            const id = document.getElementById('c-id').value;

            const visitRows = document.querySelectorAll('.p-visit-row');
            const props = Array.from(visitRows)
                .map(row => ({
                    id: row.querySelector('.p-select-prop').value,
                    precio_pedido: unformatVal(row.querySelector('.p-visit-pedido').value),
                    precio_ofrecido: unformatVal(row.querySelector('.p-visit-ofrecido').value)
                }))
                .filter(v => v.id !== '');

            const data = {
                id_cliente: id,
                nombre_cliente: document.getElementById('c-nombre').value,
                tel_cliente: document.getElementById('c-telefono').value,
                props_visitados: props
            };

            const isUpdate = document.getElementById('c-id').readOnly;

            await fetch(isUpdate ? `/api/clients/${id}` : '/api/clients', {
                method: isUpdate ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            closeModal('modal-client');
            loadClients();
        }

        async function deleteClient(id) {
            if (!confirm('¿Seguro que desea eliminar este cliente?')) return;
            await fetch(`/api/clients/${id}`, { method: 'DELETE' });
            loadClients();
        }

        // Initialize
        document.getElementById('property-form').addEventListener('submit', saveProperty);
        document.getElementById('client-form').addEventListener('submit', saveClient);

        // Button Listeners
        const btnNewProperty = document.getElementById('btn-new-property');
        if (btnNewProperty) {
            btnNewProperty.addEventListener('click', openPropertyModal);
            console.log("Event listener attached to btn-new-property");
        }

        window.onload = () => {
            console.log("Page Loaded");
            setupFormatting();
            loadProperties();
        };
    </script>
</body>

</html>
