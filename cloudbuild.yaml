steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/predios-app:$SHORT_SHA'
      - '.'

  # 2. Push the image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/predios-app:$SHORT_SHA']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'predios-app'
      - '--image=gcr.io/$PROJECT_ID/predios-app:$SHORT_SHA'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      - '--service-account=predios-runner@$PROJECT_ID.iam.gserviceaccount.com'
      - '--quiet'

images:
  - 'gcr.io/$PROJECT_ID/predios-app:$SHORT_SHA'